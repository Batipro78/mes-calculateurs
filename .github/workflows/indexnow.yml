name: IndexNow (Bing/Yandex)

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/lib/sitemap-data.ts"

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/indexnow.mjs
